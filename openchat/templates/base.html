<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}OpenChat{% endblock %}</title>
  <style>
    :root { --bg: #f6f7f9; --card: #fff; --text: #1a1a1a; --muted: #666; --accent: #2563eb; --border: #e5e7eb; --danger: #dc2626; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.5; }
    header { background: var(--card); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
    header a { color: var(--text); text-decoration: none; font-weight: 600; }
    header nav a { font-weight: 500; color: var(--muted); margin-right: 1rem; }
    header nav a:hover { color: var(--accent); }
    main { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin: 0 0 1rem; }
    h2 { font-size: 1.15rem; margin: 0 0 0.75rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
    th { font-size: 0.85rem; color: var(--muted); }
    .muted { color: var(--muted); font-size: 0.9rem; }
    .btn { display: inline-block; padding: 0.4rem 0.85rem; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); text-decoration: none; font-size: 0.9rem; cursor: pointer; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-danger { color: var(--danger); border-color: var(--danger); }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    label { display: block; font-weight: 500; margin: 0.75rem 0 0.25rem; }
    input[type=text], input[type=url], textarea { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; font: inherit; }
    textarea { min-height: 120px; font-family: inherit; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: var(--danger); padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.8rem; background: #e0e7ff; color: #3730a3; }
    .badge-off { background: #f3f4f6; color: var(--muted); }
    ul.titles { margin: 0; padding-left: 1.25rem; }
  </style>
</head>
<body>
  <header>
    <a href="/">OpenChat</a>
    <nav>
      <a href="/">대시보드</a>
      <a href="/projects">프로젝트</a>
      <a href="/settings">설정</a>
      <a href="/reports">리포트</a>
    </nav>
    <form action="/settings/reload" method="post" style="margin-left:auto">
      <button type="submit" class="btn">설정 다시 불러오기</button>
    </form>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
